name: 'Run runn'
description: 'GitHub Action for runn, a tool for api scenario testing.'
branding:
  icon: 'octagon'
  color: 'gray-dark'
inputs:
  command:
    description: run or list or loadt
    required: true
    default: 'run'
  path_pattern:
    description: Path pattern
    required: true
  github-token:
    description: The GitHub token
    default: ${{ github.token }}
    required: false
  version:
    description: Specify runn version
    required: false
    default: "v1.5.1"
  debug:
    description: Filter runbooks to be executed
    required: false
    default: false
  verbose:
    description: Verbose mode
    required: false
    default: false
  fail-fast:
    description: Fail fast mode
    required: false
    default: false
  skip-test:
    description: Skip test mode
    required: false
    default: false
  shuffle:
    description: Shuffle mode
    required: false
    default: false
  concurrent:
    description: Concurrent mode
    required: false
    default: false
  enable-read-parent-scope:
    description: Required for reading parent files.(`--scopes read:parent`)
    required: false
    default: false
  enable-read-remote-scope:
    description: Required for reading remote files.(`--scopes read:remote`)
    required: false
    default: false
  enable-run-exec-scope:
    description: Required for running Exec runner.(`--scopes run:exec`)
    required: false
    default: false
  labels:
    description: To filter execution targets, specify labels separated by commas.(For example, `foo,bar` would be `--label "foo,bar"`)
    required: false

runs:
  using: 'composite'
  steps:
    - name: 'Check input parameter'
      shell: 'bash'
      run: |
        #
        # subcommand check
        #
        if [[ ! "${{ inputs.command }}" =~ ^(run|list|loadt)$ ]]; then
          echo "Error: Invalid command ${{ inputs.command }} is not supported. Please specify run or list or loadt."
          exit 1
        fi

        #
        # version check
        #
        if [[ "${{ inputs.version }}" == "latest" ]]; then
          exit 0
        fi
        # vx.y.z -> x.y.z
        input_version=$(echo "${{ inputs.version }}" | sed 's/^v//')
        compatible_version=$(echo "v0.64.0" | sed 's/^v//')

        # Round the version to an integer (remove leading zeros)
        version_to_int() {
          local ver="$1"
          IFS='.' read -r major minor patch <<< "$ver"
          # Use larger multipliers to handle minor/patch versions >= 100
          echo $((10#$major * 1000000 + 10#$minor * 1000 + 10#$patch))
        }

        input_version_int=$(version_to_int "$input_version")
        compatible_version_int=$(version_to_int "$compatible_version")

        # Versions below v0.64.0 will result in an error.
        if (( input_version_int < compatible_version_int )); then
          echo "Error: runn version $input_version is not supported. Please use $compatible_version or higher."
          exit 1
        fi

        #
        # License compliance check for AGPL-3.0 issue
        # Issue: https://github.com/k1LoW/runn/issues/1319
        #
        blocked_start_version="0.71.0"
        blocked_end_version="0.138.0"

        blocked_start_int=$(version_to_int "$blocked_start_version")
        blocked_end_int=$(version_to_int "$blocked_end_version")

        if (( input_version_int >= blocked_start_int && input_version_int <= blocked_end_int )); then
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  LICENSE COMPLIANCE NOTICE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  Version v$input_version contains AGPL-3.0 licensed dependencies."
          echo ""
          echo "  📋 Affected: v0.71.0 - v0.138.0"
          echo ""
          echo "  ✅ Please update to:"
          echo "     • v0.139.0 or later (recommended)"
          echo "     • v0.70.0 or earlier"
          echo ""
          echo "  ℹ️  This action uses runn as an external tool without"
          echo "     modification or distribution. However, we recommend"
          echo "     updating to avoid any potential licensing concerns."
          echo ""
          echo "  📖 Details: https://github.com/k1LoW/runn/issues/1319"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "::warning::runn v$input_version contains AGPL-3.0 dependencies. Please update to v0.139.0+. See https://github.com/k1LoW/runn/issues/1319"
        fi
    - name: Setup k1LoW/runn
      uses: k1LoW/gh-setup@37dc37986ccadf532c61ca385342553333bbd648 # v1.11.7
      with:
        github-token: ${{ inputs.github-token }}
        repo: k1LoW/runn
        version: ${{ inputs.version }}
    - name: 'Run runn'
      shell: 'bash'
      run: |
        if [ -n "${{ inputs.labels }}" ]; then
          LABEL_OPTIONS="--label \"${{ inputs.labels }}\""
        fi
        echo "label options: $LABEL_OPTIONS"
        shopt -s globstar
        runn \
          ${{ inputs.command }} \
          ${{ inputs.path_pattern }} \
          ${{ (inputs.debug == 'true' && '--debug') || '' }} \
          ${{ (inputs.verbose == 'true' && '--verbose') || '' }} \
          ${{ (inputs.fail-fast == 'true' && '--fail-fast') || '' }} \
          ${{ (inputs.skip-test == 'true' && '--skip-test') || '' }} \
          ${{ (inputs.shuffle == 'true' && '--shuffle on') || '' }} \
          ${{ (inputs.concurrent == 'true' && '--concurrent on') || '' }} \
          ${{ (inputs.enable-read-parent-scope == 'true' && '--scopes read:parent') || '' }}  \
          ${{ (inputs.enable-read-remote-scope == 'true' && '--scopes read:remote') || '' }}  \
          ${{ (inputs.enable-run-exec-scope == 'true' && '--scopes run:exec') || '' }}  \
          $LABEL_OPTIONS
