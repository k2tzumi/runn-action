name: Integration

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-execution:
    runs-on: ubuntu-latest
    services:
      httpbin:
        image: kennethreitz/httpbin:latest
        ports:
          - 8080:80
    steps:
      - uses: actions/checkout@v5

      - name: 'Option test'
        uses: ./
        with:
          version: "v0.122.1"
          command: run
          path_pattern: testdata/path/to/*.yml
          debug: true
          verbose: true
          fail-fast: true
          skip-test: false
          shuffle: true
          concurrent: true
          enable-run-exec-scope: true
          enable-read-remote-scope: true
          enable-read-parent-scope: true
          labels: "integration,integration_http"
        env:
          # Override parameters in scenario with environment variables
          # NOTE: Specify `172.17.0.1` when accessing services on the GitHub Actions host.
          HTTPBIN_END_POINT: http://172.17.0.1:8080/
      - name: 'Check input parameter test'
        id: fail-step
        uses: ./
        with:
          command: completion
          path_pattern: testdata/path/to/exec.yml
          debug: true
          verbose: true
          fail-fast: true
          skip-test: false
          shuffle: true
          concurrent: true
        continue-on-error: true

  license-warning-test:
    runs-on: ubuntu-latest
    services:
      httpbin:
        image: kennethreitz/httpbin:latest
        ports:
          - 8080:80
    steps:
      - uses: actions/checkout@v5
      - name: 'License warning test'
        id: license-warning
        uses: ./
        with:
          version: "v0.136.0"
          command: run
          path_pattern: testdata/path/to/*.yml
          enable-run-exec-scope: true
          enable-read-remote-scope: true
          enable-read-parent-scope: true
        continue-on-error: true
      - name: 'Check warning annotation count'
        run: |
          run_id="${{ github.run_id }}"
          job_name="license-warning-test"
          # Get job ID
          job_id=$(gh api "/repos/${{ github.repository }}/actions/runs/$run_id/jobs" --jq ".jobs[] | select(.name==\"$job_name\") | .id")
          # Get warning count
          warning_count=$(gh api "/repos/${{ github.repository }}/actions/jobs/$job_id/annotations" --jq '[.[] | select(.annotation_level=="warning")] | length')
          echo "Warning count: $warning_count"
          if [ "$warning_count" -eq 0 ]; then
            echo "No license warning annotation found."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}